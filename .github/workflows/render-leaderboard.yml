name: Render Leaderboard Chart

on:
  push:
    paths:
      - "results/leaderboard.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install matplotlib numpy Pillow

      - name: Render chart
        run: python3 scripts/render_leaderboard.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/leaderboard.png
          git diff --cached --quiet || git commit -m "chore: update leaderboard chart [skip ci]"
          git push
